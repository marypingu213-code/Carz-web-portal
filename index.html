<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動遊戲大廳</title>
    <style>
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #fff9f0; 
            color: #444;
            text-align: center;
        }
        #clock-container {
            background-color: #ffffff;
            border: 3px dashed #ffb74d;
            border-radius: 20px;
            display: inline-block;
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #date-display { font-size: 1.3rem; color: #666; }
        #time-display { font-size: 2.8rem; color: #ff8c00; font-weight: bold; }
        #encouragement-text {
            font-size: 1.6rem;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 1.8em;
        }
        h1 { color: #ff8c00; font-size: 2.2em; margin-bottom: 30px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { 
            display: block;
            padding: 35px 20px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 4px solid white;
            text-align: center;
        }
        .card:hover { transform: scale(1.05) rotate(2deg); }
        .emoji { font-size: 4em; display: block; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.4em; color: #222; }
        .card p { font-size: 1rem; color: #666; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="date-display">正在確認日期...</div>
        <div id="time-display">00:00:00</div>
    </div>

    <div id="encouragement-text">✨ 準備好要開始學習了嗎？ ✨</div>

    <h1>🐾 我的互動教學大廳 🐾</h1>
    
    <div id="project-list" class="grid"></div>

    <script>
        // 1. 時間與隨機語
        function updateClock() {
            const now = new Date();
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const phrases = ["✨ 今天的你，也會有超棒的表現喔！", "🐰 阿白和土土幫你加油！", "💪 你是最棒的學習小超人！"];
        document.getElementById('encouragement-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        // 2. 妳指定的正確清單
        const username = 'marypingu213-code';
       const myProjects = [
    // 外部連結 (妳說很完美的部分)
    { title: 'Canva 互動課程', emoji: '🎨', url: 'https://www.canva.com/design/DAHEekV3BTA/mgY6zKK6trtbWczso0EFkw/view?utm_content=DAHEekV3BTA&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h6bc15d71bc', color: '#FFD1DC' },
    { title: 'Classkick 課中練習', emoji: '📋', url: 'https://www.canva.com/design/DAHEekV3BTA/km7Bk5KLnTGW3h9eyK16aw/edit', color: '#FFECB3' },
    
    // 妳提供的 10 個正確 GitHub 專案
    { id: 'resource-room', title: '資源教室大本營', emoji: '🏠', color: '#C8E6C9' },
    { id: 'Carz-math', title: '賽車學數學', emoji: '🏎️', color: '#B3E5FC' },
    { id: 'G6ch-word', title: '六年級國語生字', emoji: '📖', color: '#D1C4E9' },
    { id: 'G1-social-skills', title: '一年級社交技巧', emoji: '🤝', color: '#F8BBD0' },
    { id: 'social-skills-high', title: '高年級社交技巧', emoji: '🗣️', color: '#E1BEE7' },
    { id: 'G6-vacab-sentence', title: '六年級詞句練習', emoji: '📝', color: '#FFF9C4' },
    { id: 'G1-vacab', title: '一年級詞彙通', emoji: '🔤', color: '#FFCCBC' },
    { id: 'resize', title: '圖片縮放工具', emoji: '🖼️', color: '#DCEDC8' },
    { id: 'G6math', title: '六年級數學', emoji: '➕', color: '#B2EBF2' },
    { id: 'exam-maker', title: '超速考卷產生器', emoji: '🧪', color: '#F5F5F5' }, // 加上逗號了
    { id: 'map', title: '虛擬地圖大廳', emoji: '🗺️', color: '#FFE0B2' },
];

        const container = document.getElementById('project-list');
        
        myProjects.forEach(p => {
            const card = document.createElement('a');
            const finalUrl = p.url || `https://${username}.github.io/${p.id}/`;
            card.href = finalUrl;
            card.className = 'card';
            card.target = '_blank';
            card.style.backgroundColor = p.color;
            card.innerHTML = `<span class="emoji">${p.emoji}</span><h3>${p.title}</h3><p>點擊開始學習</p>`;
            container.appendChild(card);
        });
    </script>
</body>
</html>
