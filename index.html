<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動遊戲大廳</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #fff9f0; 
            color: #444;
            text-align: center;
        }
        #clock-container {
            background-color: #ffffff;
            border: 3px dashed #ffb74d;
            border-radius: 20px;
            display: inline-block;
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #date-display { font-size: 1.3rem; color: #666; }
        #time-display { font-size: 2.8rem; color: #ff8c00; font-weight: bold; }
        #encouragement-text {
            font-size: 1.6rem;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 1.8em;
        }
        h1 { color: #ff8c00; font-size: 2.5em; margin-bottom: 30px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { 
            display: block;
            padding: 40px 20px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 4px solid white;
            text-align: center;
        }
        .card:hover { transform: scale(1.05); }
        .emoji { font-size: 4.5em; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="date-display">正在載入...</div>
        <div id="time-display">00:00:00</div>
    </div>

    <div id="encouragement-text">✨ 準備好要開始學習了嗎？ ✨</div>

    <h1>🐾 我的互動教學大廳 🐾</h1>
    
    <div id="project-list" class="grid"></div>

    <script>
        // 1. 時間功能
        function updateClock() {
            const now = new Date();
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 隨機鼓勵語
        const magicPhrases = ["✨ 今天的你，也會有超棒的表現喔！", "🐰 阿白和土土幫你加油！", "💪 你是最棒的學習小超人！"];
        document.getElementById('encouragement-text').innerText = magicPhrases[Math.floor(Math.random() * magicPhrases.length)];

        // 3. 核心資料與渲染
        const username = 'marypingu213-code';
        const colors = ['#FFD1DC', '#FFECB3', '#C8E6C9', '#B3E5FC', '#D1C4E9', '#F8BBD0'];
        const animals = ['🐶', '🐱', '🐰', '🦊', '🐻', '🐼'];

        const externalProjects = [
            { name: 'Canva 互動課程', url: 'https://www.canva.com/design/DAHEekV3BTA/mgY6zKK6trtbWczso0EFkw/view', emoji: '🎨' },
            { name: 'Classkick 課中練習', url: 'https://www.canva.com/design/DAHEekV3BTA/km7Bk5KLnTGW3h9eyK16aw/edit', emoji: '📝' }
        ];

        function createCard(title, link, emoji, color) {
            const card = document.createElement('a');
            card.href = link;
            card.className = 'card';
            card.target = '_blank';
            card.style.backgroundColor = color;
            card.innerHTML = `<span class="emoji">${emoji}</span><h3>${title}</h3><p>點擊開始學習</p>`;
            return card;
        }

        async function init() {
            const container = document.getElementById('project-list');
            // 先放外部連結
            externalProjects.forEach((p, i) => container.appendChild(createCard(p.name, p.url, p.emoji, colors[i % colors.length])));

            // 再抓 GitHub
            try {
                const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await res.json();
                repos.forEach((repo, i) => {
                    const isPortal = repo.name.includes('portal') || repo.name.includes('github.io');
                    if (!isPortal) {
                        const emoji = (repo.name === 'grade-3-web' || repo.name === 'RICHMAN3') ? '💎' : animals[i % animals.length];
                        container.appendChild(createCard(repo.name, `https://${username}.github.io/${repo.name}/`, emoji, colors[(i + 2) % colors.length]));
                    }
                });
            } catch (e) {
                console.log("GitHub 抓取稍有延遲，請重新整理");
            }
        }

        init();
    </script>
</body>
</html>
